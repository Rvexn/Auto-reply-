<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart File Downloader</title>
    <style>
        :root {
            --primary: #0088cc;
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 30px 15px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.6rem;
        }

        #status {
            text-align: center;
            padding: 12px;
            background: #e1f5fe;
            color: #0277bd;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-card {
            border: 1px solid #eee;
            background: #fafafa;
            border-radius: 15px;
            padding: 18px;
            transition: 0.3s ease;
        }

        .file-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .file-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .icon {
            font-size: 30px;
            margin-right: 15px;
        }

        .details {
            flex: 1;
        }

        .name {
            display: block;
            font-weight: 600;
            color: var(--text);
            font-size: 15px;
            word-break: break-all;
        }

        .size {
            font-size: 12px;
            color: #888;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0077b5;
            box-shadow: 0 5px 15px rgba(0,136,204,0.3);
        }

        .btn:disabled {
            background: #abbac2;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Download Center</h2>
        <p style="font-size: 12px; color: #777;">Last 2 Files from Telegram</p>
    </div>

    <div id="status">Scanning for files...</div>
    <div id="file-container" class="file-list"></div>
</div>

<script>
    const BOT_TOKEN = '8644017950:AAGyGi3ttEEZ0KuSY6zgr_4HSI3g_0wUFec';

    async function fetchFiles() {
        const status = document.getElementById('status');
        const container = document.getElementById('file-container');
        
        try {
            // Offset use kiya hai taaki purane messages bhi mil sakein
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?limit=100&offset=-100`);
            const data = await res.json();

            if (data.ok && data.result.length > 0) {
                // Filter documents from private chat OR channel
                const docs = data.result
                    .map(u => u.message || u.channel_post)
                    .filter(m => m && m.document)
                    .slice(-2) // Last 2 files
                    .reverse();

                if (docs.length === 0) {
                    status.innerText = "❌ No files found. Bot ko file bhej kar refresh karein.";
                    return;
                }

                status.style.display = 'none';
                container.innerHTML = '';

                docs.forEach(msg => {
                    const doc = msg.document;
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    const sizeMB = (doc.file_size / (1024 * 1024)).toFixed(2);
                    
                    card.innerHTML = `
                        <div class="file-info">
                            <div class="icon">📁</div>
                            <div class="details">
                                <span class="name">${doc.file_name}</span>
                                <span class="size">${sizeMB} MB</span>
                            </div>
                        </div>
                        <button class="btn" onclick="downloadFile('${doc.file_id}', '${doc.file_name}', this)">
                            Download & Open
                        </button>
                    `;
                    container.appendChild(card);
                });
            } else {
                status.innerText = "⚠️ Bot inactive. Nayi file send karein!";
            }
        } catch (err) {
            status.innerText = "🔌 Connection Error. Internet check karein.";
        }
    }

    async function downloadFile(fileId, fileName, btn) {
        const oldText = btn.innerText;
        btn.innerText = "DOWNLOADING...";
        btn.disabled = true;

        try {
            // Get File Path from Telegram
            const pathRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
            const pathData = await pathRes.json();

            if (pathData.ok) {
                const downloadUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${pathData.result.file_path}`;

                // Fetching as blob to force browser to handle it
                const fileRes = await fetch(downloadUrl);
                const blob = await fileRes.blob();
                const blobUrl = URL.createObjectURL(blob);

                // Hidden link for download
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Open in new tab (PDF/Images/Text ke liye)
                window.open(blobUrl, '_blank');
            } else {
                alert("File path nahi mila!");
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = oldText;
            btn.disabled = false;
        }
    }

    // Auto load on start
    fetchFiles();
</script>

</body>
</html>
