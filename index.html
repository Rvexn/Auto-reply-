<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram 24h Media Sync</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #537ca1; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background-color: #517da2; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 10; }
        .header-info h2 { margin: 0; font-size: 16px; font-weight: 500; }
        .header-info span { font-size: 12px; opacity: 0.8; }
        #chat-window { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; background-color: #537ca1; scroll-behavior: smooth; padding-bottom: 120px; }
        
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #537ca1; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .start-btn { background-color: #2ecc71; color: white; border: none; padding: 20px 45px; border-radius: 50px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }

        .msg-container { display: flex; align-items: flex-end; gap: 8px; max-width: 90%; align-self: flex-start; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #ffaf40; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .tg-bubble { background: white; padding: 6px; border-radius: 12px 12px 12px 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); width: 100%; }
        .user-name { color: #ee7a11; font-weight: bold; font-size: 13px; margin-bottom: 4px; }
        video, img { width: 100%; max-width: 320px; border-radius: 8px; display: block; background: #000; }
        .time-stamp { font-size: 10px; color: #a0acb6; text-align: right; margin-top: 4px; }
        
        .footer-action { position: fixed; bottom: 30px; left: 0; width: 100%; padding: 0 15px; box-sizing: border-box; display: flex; justify-content: center; z-index: 10; }
        .invite-btn { background-color: #3498db; color: white; border: none; padding: 15px 20px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 450px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="color: white; margin-bottom: 30px;">
        <h1 style="margin: 0;">Media Player</h1>
        <p>Auto-syncing Telegram Videos (24h History)</p>
    </div>
    <button class="start-btn" onclick="startApp()">START STREAM</button>
</div>

<div class="header">
    <div class="avatar" style="background: #3498db;">T</div>
    <div class="header-info">
        <h2>Telegram Sync Pro</h2>
        <span id="status">ready</span>
    </div>
</div>

<div id="chat-window"></div>

<div class="footer-action">
    <button class="invite-btn" onclick="sendInvite()">INVITE FRIENDS</button>
</div>

<script>
    const API_TOKEN = '8246056774:AAEF1oHuj1cIRwtT3mKtcCZjlGn24XPP1es';
    const CHAT_ID = '6262892880';
    
    let mediaQueue = []; 
    let isProcessing = false;
    let lastUpdateId = 0;

    // --- 24 HOUR STORAGE LOGIC ---
    function saveToHistory(item) {
        let history = JSON.parse(localStorage.getItem('tg_media_history')) || [];
        const exists = history.find(h => h.id === item.id);
        if (!exists) {
            item.timestamp = Date.now();
            history.push(item);
            localStorage.setItem('tg_media_history', JSON.stringify(history));
        }
    }

    function getHistory() {
        let history = JSON.parse(localStorage.getItem('tg_media_history')) || [];
        const oneDay = 24 * 60 * 60 * 1000;
        // 24 ghante se purane videos delete karo
        history = history.filter(item => (Date.now() - item.timestamp) < oneDay);
        localStorage.setItem('tg_media_history', JSON.stringify(history));
        return history;
    }

    // --- APP LOGIC ---
    async function startApp() {
        document.getElementById('start-overlay').style.display = 'none';
        
        // 1. Pehle history se load karo
        const history = getHistory();
        mediaQueue = [...history];
        
        // 2. Fetch new from API
        fetchNewMedia();
        setInterval(fetchNewMedia, 20000); 

        if (mediaQueue.length > 0) processQueue();
    }

    async function fetchNewMedia() {
        const url = `https://api.telegram.org/bot${API_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.ok && data.result.length > 0) {
                data.result.forEach(update => {
                    lastUpdateId = update.update_id;
                    const msg = update.message;
                    if (msg && msg.chat.id.toString() === CHAT_ID) {
                        let fileId = msg.video ? msg.video.file_id : (msg.photo ? msg.photo[msg.photo.length - 1].file_id : null);
                        let type = msg.video ? 'video' : (msg.photo ? 'photo' : null);
                        
                        if (fileId) {
                            let item = { id: fileId, type: type, sender: msg.from.first_name || "Admin" };
                            saveToHistory(item);
                            // Agar queue khali hai toh add karo
                            if (!mediaQueue.find(m => m.id === fileId)) {
                                mediaQueue.push(item);
                            }
                        }
                    }
                });
                if (!isProcessing) processQueue();
            }
        } catch (e) { console.error("API Error"); }
    }

    async function processQueue() {
        if (mediaQueue.length === 0) {
            isProcessing = false;
            document.getElementById('status').innerText = 'waiting for new media...';
            return;
        }
        isProcessing = true;
        const item = mediaQueue.shift();
        await renderMedia(item);
    }

    async function renderMedia(item) {
        document.getElementById('status').innerText = 'playing...';
        try {
            const pathRes = await fetch(`https://api.telegram.org/bot${API_TOKEN}/getFile?file_id=${item.id}`);
            const pathData = await pathRes.json();
            const fileUrl = `https://api.telegram.org/file/bot${API_TOKEN}/${pathData.result.file_path}`;
            
            const chat = document.getElementById('chat-window');
            const container = document.createElement('div');
            container.className = 'msg-container';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            container.innerHTML = `
                <div class="avatar">${item.sender[0]}</div>
                <div class="tg-bubble">
                    <div class="user-name">${item.sender}</div>
                    ${item.type === 'video' ? 
                        `<video src="${fileUrl}" controls autoplay muted playsinline></video>` : 
                        `<img src="${fileUrl}">`}
                    <div class="time-stamp">${time}</div>
                </div>
            `;
            chat.prepend(container);

            if (item.type === 'video') {
                const v = container.querySelector('video');
                // AUTO PLAY NEXT LOGIC
                v.onended = () => {
                    v.style.opacity = "0.5"; // Indicate played
                    processQueue();
                };
                v.onerror = () => processQueue();
            } else {
                setTimeout(processQueue, 5000); // Image 5 sec baad next
            }
        } catch (e) { processQueue(); }
    }

    function sendInvite() {
        window.open("https://t.me/share/url?url=Join us for viral videos!");
    }
</script>
</body>
</html>
